name: release-please

# Release automation. On every push to main, release-please maintains a "Release PR" that bumps the
# version (from Conventional Commits) and updates the changelog. Merging that Release PR creates the
# vX.Y.Z tag and a GitHub Release; the publish job below then packs and pushes the NuGet packages.
# MinVer reads the tag release-please creates and stamps it into the packages — the two compose.
#
# Publishing uses NuGet trusted publishing (OIDC): the job requests a short-lived GitHub OIDC token,
# exchanges it at nuget.org via NuGet/login for a temporary (1-hour) API key, and pushes with that.
# No long-lived API key is stored. nuget.org side requires a trusted publishing policy matching this
# repo owner (BlakeHastings), repository (hindstorm), and workflow file (release-please.yml).
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Manifest-driven config (release-please-config.json + .release-please-manifest.json).
      # Uses the default GITHUB_TOKEN: the publish job runs in this same workflow run (gated on
      # release_created), so the "GITHUB_TOKEN does not trigger downstream workflows" limitation
      # does not apply and no PAT is needed.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Request the GitHub OIDC token for NuGet trusted publishing.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # MinVer needs full history + the tag release-please just created.

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output artifacts

      # Exchange the OIDC token for a short-lived nuget.org API key. The key is valid for one hour, so
      # this runs immediately before the push. NUGET_USER is the nuget.org account/profile name (not an
      # email) that owns the trusted publishing policy.
      - name: NuGet login (OIDC to temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
